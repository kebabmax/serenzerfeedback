<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Serenzer Feedback Admin</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f0e8;
      --card: #fffdf8;
      --card-strong: #f8f4ec;
      --border: #d9d2c4;
      --text: #3f4a43;
      --muted: #7f7a71;
      --sage: #90b090;
      --sage-dark: #6b8f71;
      --red: #c94a43;
      --shadow: 0 18px 48px rgba(63, 74, 67, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'DM Sans', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(144, 176, 144, 0.18), transparent 30%),
        linear-gradient(180deg, #f8f4ec 0%, var(--bg) 100%);
      color: var(--text);
    }

    .page {
      max-width: 1440px;
      margin: 0 auto;
      padding: 32px 24px 40px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: flex-end;
      margin-bottom: 24px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-family: 'DM Serif Display', serif;
      font-size: clamp(34px, 4vw, 50px);
      line-height: 1;
      color: var(--text);
    }

    .hero p {
      margin: 0;
      max-width: 720px;
      color: var(--muted);
      line-height: 1.6;
    }

    .hero-meta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .stat-card {
      min-width: 140px;
      padding: 16px 18px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(255, 253, 248, 0.92);
      box-shadow: var(--shadow);
    }

    .stat-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }

    .toolbar input,
    .toolbar select,
    .toolbar button {
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255, 253, 248, 0.95);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 12px 14px;
    }

    .toolbar input,
    .toolbar select {
      min-width: 220px;
    }

    .toolbar button {
      cursor: pointer;
      font-weight: 700;
    }

    .toolbar button:hover {
      border-color: var(--sage-dark);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(320px, 420px) minmax(0, 1fr);
      gap: 20px;
      align-items: start;
    }

    .panel {
      background: rgba(255, 253, 248, 0.94);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-header {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--card-strong);
    }

    .panel-title {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .submission-list {
      max-height: calc(100vh - 260px);
      overflow: auto;
    }

    .submission-row {
      width: 100%;
      border: none;
      border-bottom: 1px solid rgba(217, 210, 196, 0.7);
      background: transparent;
      text-align: left;
      padding: 16px 20px;
      cursor: pointer;
      display: grid;
      gap: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
    }

    .submission-row:hover,
    .submission-row.active {
      background: rgba(144, 176, 144, 0.12);
    }

    .submission-topline {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .submission-email {
      font-weight: 700;
      font-size: 15px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .submission-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .badge.complete {
      background: rgba(144, 176, 144, 0.18);
      color: var(--sage-dark);
    }

    .badge.incomplete {
      background: rgba(201, 74, 67, 0.12);
      color: var(--red);
    }

    .detail-scroll {
      max-height: calc(100vh - 260px);
      overflow: auto;
      padding: 20px;
      display: grid;
      gap: 16px;
    }

    .empty-state {
      padding: 32px 20px;
      color: var(--muted);
      line-height: 1.6;
    }

    .detail-card {
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--card);
      padding: 18px;
    }

    .detail-card h3 {
      margin: 0 0 14px;
      font-size: 16px;
      font-weight: 700;
    }

    .kv-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }

    .kv-item {
      padding: 12px;
      border-radius: 14px;
      background: var(--card-strong);
    }

    .kv-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .kv-value {
      font-size: 14px;
      line-height: 1.45;
      word-break: break-word;
    }

    .tool-block {
      border-top: 1px solid rgba(217, 210, 196, 0.7);
      padding-top: 12px;
      margin-top: 12px;
    }

    .tool-block:first-child {
      border-top: none;
      padding-top: 0;
      margin-top: 0;
    }

    .tool-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 12px;
      line-height: 1.55;
      color: var(--text);
      background: #f6f1e8;
      border-radius: 14px;
      padding: 14px;
      border: 1px solid var(--border);
      overflow: auto;
    }

    .muted {
      color: var(--muted);
    }

    @media (max-width: 980px) {
      .page { padding: 20px 16px 32px; }
      .hero { flex-direction: column; align-items: stretch; }
      .layout { grid-template-columns: 1fr; }
      .submission-list,
      .detail-scroll { max-height: none; }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <div>
        <h1>Feedback Admin</h1>
        <p>
          Internal view for the Serenzer beta feedback. Filter testers, inspect progress,
          and open the full saved payload without touching SQLite manually.
        </p>
      </div>
      <div class="hero-meta">
        <div class="stat-card">
          <div class="stat-label">Submissions</div>
          <div class="stat-value" id="stat-total">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Completed</div>
          <div class="stat-value" id="stat-complete">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">In Progress</div>
          <div class="stat-value" id="stat-incomplete">0</div>
        </div>
      </div>
    </section>

    <section class="toolbar">
      <input id="search-input" type="search" placeholder="Search by email, invitation number, or ID">
      <select id="status-filter">
        <option value="all">All statuses</option>
        <option value="complete">Completed only</option>
        <option value="incomplete">In progress only</option>
      </select>
      <select id="lang-filter">
        <option value="all">All languages</option>
      </select>
      <button id="refresh-btn" type="button">Refresh</button>
    </section>

    <section class="layout">
      <div class="panel">
        <div class="panel-header">
          <h2 class="panel-title">Submissions</h2>
        </div>
        <div class="submission-list" id="submission-list"></div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <h2 class="panel-title">Details</h2>
        </div>
        <div class="detail-scroll" id="detail-pane">
          <div class="empty-state">Select a submission on the left to inspect the saved feedback.</div>
        </div>
      </div>
    </section>
  </div>

  <script>
    const state = {
      list: [],
      filtered: [],
      activeId: null,
      detailCache: {},
    };

    function esc(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function formatDate(value) {
      if (!value) return "—";
      try {
        return new Date(value).toLocaleString();
      } catch (_) {
        return value;
      }
    }

    function renderStats() {
      const total = state.list.length;
      const complete = state.list.filter(item => item.isComplete).length;
      document.getElementById("stat-total").textContent = total;
      document.getElementById("stat-complete").textContent = complete;
      document.getElementById("stat-incomplete").textContent = total - complete;
    }

    function renderLanguageOptions() {
      const select = document.getElementById("lang-filter");
      const current = select.value || "all";
      const langs = [...new Set(state.list.map(item => item.lang).filter(Boolean))].sort();
      select.innerHTML = `
        <option value="all">All languages</option>
        ${langs.map(lang => `<option value="${esc(lang)}">${esc(lang.toUpperCase())}</option>`).join("")}
      `;
      select.value = langs.includes(current) ? current : "all";
    }

    function applyFilters() {
      const query = document.getElementById("search-input").value.trim().toLowerCase();
      const status = document.getElementById("status-filter").value;
      const lang = document.getElementById("lang-filter").value;

      state.filtered = state.list.filter(item => {
        const haystack = [item.email, item.invitationNumber, item.submissionId, item.lang]
          .filter(Boolean)
          .join(" ")
          .toLowerCase();
        const matchesQuery = !query || haystack.includes(query);
        const matchesStatus = status === "all"
          || (status === "complete" && item.isComplete)
          || (status === "incomplete" && !item.isComplete);
        const matchesLang = lang === "all" || item.lang === lang;
        return matchesQuery && matchesStatus && matchesLang;
      });

      if (!state.filtered.some(item => item.submissionId === state.activeId)) {
        state.activeId = state.filtered[0]?.submissionId || null;
      }

      renderList();
      if (state.activeId) {
        loadDetail(state.activeId);
      } else {
        renderEmptyDetail("No submissions match the current filters.");
      }
    }

    function renderList() {
      const list = document.getElementById("submission-list");
      if (!state.filtered.length) {
        list.innerHTML = `<div class="empty-state">No submissions found yet.</div>`;
        return;
      }

      list.innerHTML = state.filtered.map(item => `
        <button class="submission-row ${item.submissionId === state.activeId ? "active" : ""}" data-id="${esc(item.submissionId)}" type="button">
          <div class="submission-topline">
            <div class="submission-email">${esc(item.email || item.invitationNumber || item.submissionId)}</div>
            <span class="badge ${item.isComplete ? "complete" : "incomplete"}">${item.isComplete ? "Complete" : "In progress"}</span>
          </div>
          <div class="submission-meta">
            <span>${esc((item.lang || "—").toUpperCase())}</span>
            <span>${esc(item.invitationNumber || "No invitation")}</span>
            <span>${esc(formatDate(item.updatedAt))}</span>
          </div>
        </button>
      `).join("");

      list.querySelectorAll("[data-id]").forEach(button => {
        button.addEventListener("click", () => {
          state.activeId = button.dataset.id;
          renderList();
          loadDetail(state.activeId);
        });
      });
    }

    function renderEmptyDetail(message) {
      document.getElementById("detail-pane").innerHTML = `<div class="empty-state">${esc(message)}</div>`;
    }

    function renderDetail(detail) {
      const completedTabs = Array.isArray(detail.completedTabs) ? detail.completedTabs.join(", ") : "—";
      const tools = detail.tools || {};
      const onboarding = detail.onboarding || {};

      document.getElementById("detail-pane").innerHTML = `
        <div class="detail-card">
          <h3>Overview</h3>
          <div class="kv-grid">
            <div class="kv-item"><div class="kv-label">Submission ID</div><div class="kv-value">${esc(detail.submissionId)}</div></div>
            <div class="kv-item"><div class="kv-label">Email</div><div class="kv-value">${esc(detail.email || "—")}</div></div>
            <div class="kv-item"><div class="kv-label">Invitation #</div><div class="kv-value">${esc(detail.invitationNumber || "—")}</div></div>
            <div class="kv-item"><div class="kv-label">Language</div><div class="kv-value">${esc((detail.lang || "—").toUpperCase())}</div></div>
            <div class="kv-item"><div class="kv-label">Status</div><div class="kv-value">${detail.isComplete ? "Complete" : "In progress"}</div></div>
            <div class="kv-item"><div class="kv-label">Completed Tabs</div><div class="kv-value">${esc(completedTabs || "—")}</div></div>
            <div class="kv-item"><div class="kv-label">Created</div><div class="kv-value">${esc(formatDate(detail.createdAt))}</div></div>
            <div class="kv-item"><div class="kv-label">Updated</div><div class="kv-value">${esc(formatDate(detail.updatedAt))}</div></div>
          </div>
        </div>

        <div class="detail-card">
          <h3>Onboarding</h3>
          <pre>${esc(JSON.stringify(onboarding, null, 2))}</pre>
        </div>

        <div class="detail-card">
          <h3>Tool Responses</h3>
          ${Object.keys(tools).length
            ? Object.entries(tools).map(([toolKey, value]) => `
              <div class="tool-block">
                <div class="tool-title">${esc(toolKey)}</div>
                <pre>${esc(JSON.stringify(value, null, 2))}</pre>
              </div>
            `).join("")
            : `<div class="muted">No tool responses saved yet.</div>`
          }
        </div>

        <div class="detail-card">
          <h3>Full Payload</h3>
          <pre>${esc(JSON.stringify(detail.payload || detail, null, 2))}</pre>
        </div>
      `;
    }

    async function loadList() {
      const response = await fetch("/api/feedback");
      if (!response.ok) throw new Error(`Failed to load submissions (${response.status})`);
      const data = await response.json();
      state.list = data.items || [];
      renderStats();
      renderLanguageOptions();
      applyFilters();
    }

    async function loadDetail(submissionId) {
      if (!submissionId) return;
      if (state.detailCache[submissionId]) {
        renderDetail(state.detailCache[submissionId]);
        return;
      }
      renderEmptyDetail("Loading submission…");
      const response = await fetch(`/api/feedback/${encodeURIComponent(submissionId)}`);
      if (!response.ok) {
        renderEmptyDetail(`Could not load submission ${submissionId}.`);
        return;
      }
      const detail = await response.json();
      state.detailCache[submissionId] = detail;
      renderDetail(detail);
    }

    async function refreshAll() {
      document.getElementById("submission-list").innerHTML = `<div class="empty-state">Loading submissions…</div>`;
      renderEmptyDetail("Loading details…");
      state.detailCache = {};
      try {
        await loadList();
      } catch (error) {
        document.getElementById("submission-list").innerHTML = `<div class="empty-state">${esc(error.message)}</div>`;
        renderEmptyDetail("The admin page could not reach the feedback API.");
      }
    }

    document.getElementById("search-input").addEventListener("input", applyFilters);
    document.getElementById("status-filter").addEventListener("change", applyFilters);
    document.getElementById("lang-filter").addEventListener("change", applyFilters);
    document.getElementById("refresh-btn").addEventListener("click", refreshAll);

    refreshAll();
  </script>
</body>
</html>
