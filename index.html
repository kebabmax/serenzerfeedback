        <select class="lang-select" id="lang-select">

          <option value="de">🇩🇪 DE</option>

      </div>
    </div>

    <div class="content-area">
      <div id="tab-content"></div>
    </div>
  </main>

  <div class="overlay hidden" id="overlay"></div>

  <div class="lang-splash hidden" id="lang-splash">

  </div>

    </div>
    <div class="sidebar-inner" id="mobile-sidebar-inner"></div>
  </aside>

  <div class="debug-menu" id="debug-menu">
    <div class="debug-menu-panel hidden" id="debug-menu-panel">
      <button class="debug-unlock-btn" id="debug-unlock-btn" type="button">
        TEMP UNLOCK ALL TABS
        <span>Bypass steps 1 and 2 for testing</span>
      </button>

      <button class="debug-deadline-btn" id="debug-deadline-btn" type="button">
        TEMP TEST SESSION END
        <span>Push deadline forward for countdown test</span>
      </button>

      <button class="debug-deadline-reset-btn" id="debug-deadline-reset-btn" type="button">
        TEMP RESET SESSION END
        <span>Restore May 10 at 22:00 CEST</span>
      </button>

      <button class="debug-wipe-btn" id="debug-wipe-btn" type="button">
        TEMP WIPE EVERYTHING
        <span>Remove before publishing</span>
      </button>
    </div>

    <button class="debug-menu-toggle" id="debug-menu-toggle" type="button" aria-label="Open debug menu" aria-expanded="false">
      <span class="debug-menu-icon">!</span>
    </button>
  </div>
</div>

// ── State ─────────────────────────────────────────────────────────────────────

const STORAGE_KEY = "serenzer_feedback_v2";

const state = {
  activeTab: 1,
  completed: {},
  onboardingData: {},
  toolData: {},
  mobileOpen: false,
  debugMenuOpen: false,
  debugUnlockAllTabs: false,
  lang: "en",
  langSelected: false,
  autosaveStatus: "saved",
};

let autosaveTimer = null;

// ── Translation helper ────────────────────────────────────────────────────────

function t(key) {
  return T[state.lang]?.[key] ?? T.fr[key] ?? key;
}

function toolT(key) {
  return T[state.lang]?.tools?.[key] ?? T.fr.tools[key];
}

function getNavTabs() {
  return [
    { id: 1, label: t("tabTutorial"),   icon: "·" },
    { id: 2, label: t("tabOnboarding"), icon: "·" },
    ...TOOLS.map(tool => ({ id: tool.id, label: toolT(tool.key).label, icon: tool.icon })),
  ];
}

// ── Storage ───────────────────────────────────────────────────────────────────

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      state.completed      = saved.completed      || {};
      state.onboardingData = saved.onboardingData || {};
      state.toolData       = saved.toolData       || {};
      if (saved.lang && T[saved.lang]) state.lang = saved.lang;
      if (saved.langSelected) state.langSelected = true;
    }
  } catch (_) {}
}

function persistNow() {
  clearTimeout(autosaveTimer);
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      completed:      state.completed,
      onboardingData: state.onboardingData,
      toolData:       state.toolData,
      lang:           state.lang,
      langSelected:   state.langSelected,
    }));
  } catch (_) {}
}

// ── Helpers ───────────────────────────────────────────────────────────────────

function totalCompleted() { return Object.keys(state.completed).length; }
function progressPct()    { return Math.round((totalCompleted() / 11) * 100); }
function isLocked(tabId)  { return !state.debugUnlockAllTabs && tabId >= 3 && !(state.completed[1] && state.completed[2]); }

function getTabStatus(tabId) {
  if (state.completed[tabId]) return "done";
  if (isLocked(tabId))        return "locked";
  return "open";
}

function esc(str) {
  return String(str || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function autosaveIndicatorHTML() {
  const isSaved = state.autosaveStatus === "saved";
  return `
    <span
      class="autosave-indicator ${isSaved ? "saved" : "saving"}"
      aria-label="${isSaved ? "Saved" : "Saving"}"
      role="status"
    >
      ${checkIconSVG("autosave-check-icon")}
    </span>
  `;
}

function checkIconSVG(className = "") {
  return `
    <svg class="${className}" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <path d="M6.8 12.6L10.5 16.3L18 8.7" />
    </svg>
  `;
}

function doneBadgeHTML(className = "") {
  return `
    <span class="status-badge status-badge-done ${className}">
      ${checkIconSVG("status-badge-check")}
    </span>
  `;
}

function emailIconSVG(className = "") {
  return `
    <svg class="${className}" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <path d="M4 7.5H20V16.5H4Z" />
      <path d="M4.8 8.1L12 13.3L19.2 8.1" />
    </svg>
  `;
}

function updateAutosaveIndicators() {
  const isSaved = state.autosaveStatus === "saved";
  document.querySelectorAll(".autosave-indicator").forEach(el => {
    el.classList.toggle("saved", isSaved);
    el.classList.toggle("saving", !isSaved);
    el.setAttribute("aria-label", isSaved ? "Saved" : "Saving");
  });
}

function setAutosaveStatus(status) {
  state.autosaveStatus = status;
  updateAutosaveIndicators();
}

function schedulePersist() {
  setAutosaveStatus("saving");
  clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(() => {
    persistNow();
    setAutosaveStatus("saved");
  }, 1500);
}

function resetAppState() {
  clearTimeout(autosaveTimer);
  localStorage.removeItem(STORAGE_KEY);

  state.activeTab = 1;
  state.completed = {};
  state.onboardingData = {};
  state.toolData = {};
  state.mobileOpen = false;
  state.lang = "en";
  state.langSelected = false;
  state.autosaveStatus = "saved";

  document.documentElement.lang = state.lang;
  renderAll();
  renderSplash();
  document.getElementById("lang-splash").classList.remove("hidden");
}

// ── Sidebar ───────────────────────────────────────────────────────────────────

function renderSidebarContent(containerId) {
  const el = document.getElementById(containerId);
  if (!el) return;

  el.innerHTML = `
    <div class="sidebar-logo">
      <img src="https://apps.serenzer.com/static/serenzer_wave.png" alt="Serenzer" onerror="this.style.display='none'">
      <div class="sidebar-logo-title">${t("betaFeedback")}</div>
      <div class="sidebar-logo-count">${t("completed")(totalCompleted())}</div>
      <div class="sidebar-progress">
        <div class="sidebar-progress-fill" style="width:${progressPct()}%"></div>
      </div>
    </div>
    <nav class="sidebar-nav">
      ${getNavTabs().map(tab => navItemHTML(tab)).join("")}
    </nav>
    <div class="sidebar-footer">
      <a class="sidebar-email-link" href="mailto:noejore@serenzer.com">
        ${emailIconSVG("sidebar-email-icon")}
        <span>${t("emailUs")}</span>
      </a>
      <div class="session-countdown">
        <span class="countdown-label">${t("sessionEndsIn")}</span>
        <span class="countdown-timer"></span>
      </div>
      <div class="autosave-label">
        ${autosaveIndicatorHTML()}
        <span>${t("autosave")}</span>
      </div>
    </div>
  `;

  el.querySelectorAll(".nav-item").forEach(btn => {
    btn.addEventListener("click", () => handleTabClick(parseInt(btn.dataset.tabId)));
  });
}

function navItemHTML(tab) {
  const status   = getTabStatus(tab.id);
  const isActive = state.activeTab === tab.id;
  const cls      = ["nav-item", isActive ? "active" : "", status === "locked" ? "locked" : ""].filter(Boolean).join(" ");
  const statusIcon = status === "done" ? doneBadgeHTML("nav-item-status")
                   : status === "locked" ? `<span class="nav-item-status nav-item-status-locked">-</span>` : "";
  return `
    <button class="${cls}" data-tab-id="${tab.id}">
      <span class="nav-item-label">${tab.label}</span>
      ${statusIcon}
    </button>
  `;
}

// ── Topbar ────────────────────────────────────────────────────────────────────

function updateTopBar() {
  const tab = getNavTabs().find(tb => tb.id === state.activeTab);
  document.getElementById("topbar-title").textContent = tab ? tab.label : "";
  document.getElementById("progress-text").textContent = `${totalCompleted()}/11`;
  document.getElementById("progress-fill").style.width = `${progressPct()}%`;
  document.getElementById("lang-select").value = state.lang;
}

// ── Tab content ───────────────────────────────────────────────────────────────

function renderContent() {
  const container = document.getElementById("tab-content");
  if (!container) return;

  if (state.activeTab === 1) {
    container.innerHTML = tutorielHTML();
    document.getElementById("tutoriel-start-btn").addEventListener("click", () => markComplete(1));

  } else if (state.activeTab === 2) {
    container.innerHTML = onboardingHTML();
    attachOnboardingListeners();

  } else {
    const tool = TOOLS.find(tl => tl.id === state.activeTab);
    if (tool) {
      container.innerHTML = toolTabHTML(tool);
      attachToolListeners(tool);
    }
  }
}

function attachOnboardingListeners() {
  ["firstName", "lastName", "email", "invitationNumber", "hopes"].forEach(field => {
    const el = document.getElementById(`inp-${field}`);
    if (!el) return;
    el.addEventListener("input", () => {
      state.onboardingData[field] = el.value;
      schedulePersist();
      refreshOnboardingSubmit();
    });
  });

  document.querySelectorAll(".checkbox-group").forEach(group => {
    const key = group.dataset.groupKey;
    group.querySelectorAll("input").forEach(input => {
      input.addEventListener("change", () => {
        if (input.type === "radio") {
          state.onboardingData[key] = input.value;
        } else {
          const cur = state.onboardingData[key] || [];
          state.onboardingData[key] = input.checked
            ? [...cur, input.value]
            : cur.filter(v => v !== input.value);
        }
        group.querySelectorAll(".checkbox-option").forEach(lbl => {
          lbl.classList.toggle("checked", lbl.querySelector("input").checked);
        });
        schedulePersist();
        refreshOnboardingSubmit();
      });
    });
  });

  document.getElementById("onboarding-submit-btn")?.addEventListener("click", () => markComplete(2));
}

function refreshOnboardingSubmit() {
  const d = state.onboardingData;
  const isValid = d.firstName && d.lastName && d.email && d.invitationNumber && d.tech && (d.devices || []).length > 0 && d.time;
  const btn  = document.getElementById("onboarding-submit-btn");
  const hint = document.querySelector(".field-hint");
  if (btn) btn.disabled = !isValid;
  if (isValid && hint) hint.remove();
  if (!isValid && !hint && btn) {
    btn.insertAdjacentHTML("afterend", `<p class="field-hint">${t("requiredFields")}</p>`);
  }
}

function attachToolListeners(tool) {
  const key = tool.key;
  if (key === "coach") {
    attachCoachListeners(tool);
    return;
  }

  document.querySelectorAll(".star-rating").forEach(ratingEl => {
    const ratingKey = ratingEl.dataset.ratingKey;
    ratingEl.querySelectorAll(".star-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const val = parseInt(btn.dataset.star);
        if (!state.toolData[key]) state.toolData[key] = {};
        state.toolData[key][ratingKey] = val;
        schedulePersist();
        ratingEl.querySelectorAll(".star-btn").forEach(s => {
          s.classList.toggle("active", parseInt(s.dataset.star) <= val);
        });
        refreshToolSubmit(tool);
      });
    });
  });

  document.querySelectorAll(".checkbox-group").forEach(group => {
    const groupKey = group.dataset.groupKey;
    const isSingle = !!group.querySelector('input[type="radio"]');
    group.querySelectorAll("input").forEach(input => {
      input.addEventListener("change", () => {
        if (!state.toolData[key]) state.toolData[key] = {};
        if (isSingle) {
          const checked = group.querySelector("input:checked");
          state.toolData[key][groupKey] = checked ? checked.value : "";
        } else {
          const cur = state.toolData[key][groupKey] || [];
          state.toolData[key][groupKey] = input.checked
            ? [...cur, input.value]
            : cur.filter(v => v !== input.value);
        }
        group.querySelectorAll(".checkbox-option").forEach(lbl => {
          lbl.classList.toggle("checked", lbl.querySelector("input").checked);
        });
        schedulePersist();
        refreshToolSubmit(tool);
      });
    });
  });

  ["description", "suggestions"].forEach(field => {
    const el = document.getElementById(`inp-${field}`);
    if (!el) return;
    el.addEventListener("input", () => {
      if (!state.toolData[key]) state.toolData[key] = {};
      state.toolData[key][field] = el.value;
      schedulePersist();
    });
  });

  if (tool.key === "tableauIntro") {
    const detailsEl = document.getElementById("inp-pageDetailsSense");
    detailsEl?.addEventListener("input", () => {
      if (!state.toolData[key]) state.toolData[key] = {};
      state.toolData[key].pageDetailsSense = detailsEl.value;
      schedulePersist();
      refreshToolSubmit(tool);
    });
  }

  if (tool.key === "calendrier") {
    document.querySelectorAll("[data-calendar-task]").forEach(input => {
      input.addEventListener("change", () => {
        if (!state.toolData[key]) state.toolData[key] = {};
        state.toolData[key][input.dataset.calendarTask] = input.checked;
        input.closest(".coach-action-item")?.classList.toggle("checked", input.checked);
        schedulePersist();
        refreshToolSubmit(tool);
      });
    });
  }

  if (tool.key === "rituels") {
    document.querySelectorAll("[data-ritual-task]").forEach(input => {
      input.addEventListener("change", () => {
        if (!state.toolData[key]) state.toolData[key] = {};
        state.toolData[key][input.dataset.ritualTask] = input.checked;
        input.closest(".coach-action-item")?.classList.toggle("checked", input.checked);
        schedulePersist();
        refreshToolSubmit(tool);
      });
    });

    ["ritualNewSense", "ritualAiSense"].forEach(field => {
      const el = document.getElementById(`inp-${field}`);
      if (!el) return;
      el.addEventListener("input", () => {
        if (!state.toolData[key]) state.toolData[key] = {};
        state.toolData[key][field] = el.value;
        schedulePersist();
        refreshToolSubmit(tool);
      });
    });
  }

  document.getElementById("tool-submit-btn")?.addEventListener("click", () => {
    const fields = tool.key === "tableauIntro"
      ? ["description", "suggestions", "pageDetailsSense"]
      : tool.key === "calendrier"
        ? ["description", "suggestions"]
      : tool.key === "rituels"
        ? ["description", "suggestions", "ritualNewSense", "ritualAiSense"]
        : ["description", "suggestions"];

    fields.forEach(field => {
      const el = document.getElementById(`inp-${field}`);
      if (el) {
        if (!state.toolData[key]) state.toolData[key] = {};
        state.toolData[key][field] = el.value;
      }
    });
    persistNow();
    setAutosaveStatus("saved");
    markComplete(state.activeTab);
  });
}

function attachCoachListeners(tool) {
  const key = tool.key;
  const observationKeys = ["coachObs1", "coachObs2", "coachObs3", "coachObs4", "coachObs5"];

  document.querySelectorAll("[data-coach-action]").forEach(input => {
    input.addEventListener("change", () => {
      if (!state.toolData[key]) state.toolData[key] = {};
      state.toolData[key][input.dataset.coachAction] = input.checked;
      input.closest(".coach-action-item")?.classList.toggle("checked", input.checked);
      schedulePersist();
      refreshToolSubmit(tool);
    });
  });

  document.querySelectorAll("[data-coach-answer-key]").forEach(btn => {
    btn.addEventListener("click", () => {
      if (!state.toolData[key]) state.toolData[key] = {};
      state.toolData[key][btn.dataset.coachAnswerKey] = btn.dataset.coachAnswerValue;
      const selector = `[data-coach-answer-key="${btn.dataset.coachAnswerKey}"]`;
      document.querySelectorAll(selector).forEach(el => {
        el.classList.toggle("active", el === btn);
      });
      schedulePersist();
      refreshToolSubmit(tool);
    });
  });

  observationKeys.forEach(baseKey => {
    const commentKey = `${baseKey}Comment`;
    const el = document.getElementById(`inp-${commentKey}`);
    if (!el) return;
    el.addEventListener("input", () => {
      if (!state.toolData[key]) state.toolData[key] = {};
      state.toolData[key][commentKey] = el.value;
      schedulePersist();
    });
  });

  document.querySelectorAll(".star-rating").forEach(ratingEl => {
    const ratingKey = ratingEl.dataset.ratingKey;
    ratingEl.querySelectorAll(".star-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const val = parseInt(btn.dataset.star);
        if (!state.toolData[key]) state.toolData[key] = {};
        state.toolData[key][ratingKey] = val;
        ratingEl.querySelectorAll(".star-btn").forEach(s => {
          s.classList.toggle("active", parseInt(s.dataset.star) <= val);
        });
        schedulePersist();
        refreshToolSubmit(tool);
      });
    });
  });

  document.querySelectorAll(".checkbox-group").forEach(group => {
    const groupKey = group.dataset.groupKey;
    if (groupKey.startsWith("coachObs")) return;
    group.querySelectorAll("input").forEach(input => {
      input.addEventListener("change", () => {
        if (!state.toolData[key]) state.toolData[key] = {};
        const cur = state.toolData[key][groupKey] || [];
        state.toolData[key][groupKey] = input.checked
          ? [...cur, input.value]
          : cur.filter(v => v !== input.value);
        group.querySelectorAll(".checkbox-option").forEach(lbl => {
          lbl.classList.toggle("checked", lbl.querySelector("input").checked);
        });
        schedulePersist();
      });
    });
  });

  ["description", "suggestions"].forEach(field => {
    const el = document.getElementById(`inp-${field}`);
    if (!el) return;
    el.addEventListener("input", () => {
      if (!state.toolData[key]) state.toolData[key] = {};
      state.toolData[key][field] = el.value;
      schedulePersist();
    });
  });

  document.getElementById("tool-submit-btn")?.addEventListener("click", () => {
    observationKeys.forEach(baseKey => {
      const commentKey = `${baseKey}Comment`;
      const el = document.getElementById(`inp-${commentKey}`);
      if (el) {
        if (!state.toolData[key]) state.toolData[key] = {};
        state.toolData[key][commentKey] = el.value;
      }
    });
    ["description", "suggestions"].forEach(field => {
      const el = document.getElementById(`inp-${field}`);
      if (el) {
        if (!state.toolData[key]) state.toolData[key] = {};
        state.toolData[key][field] = el.value;
      }
    });
    persistNow();
    setAutosaveStatus("saved");
    markComplete(state.activeTab);
  });
}

function refreshToolSubmit(tool) {
  const d = state.toolData[tool.key] || {};
  const isValid = tool.key === "tableauIntro"
    ? d.intuitive && d.useful && d.dateTimeCorrect && d.greetingMatchesTime && d.startConversationWorks && String(d.pageDetailsSense || "").trim()
    : tool.key === "coach"
      ? ["coachAction1Done", "coachAction2Done", "coachAction3Done"].every(key => !!d[key])
        && ["coachObs1", "coachObs2", "coachObs3", "coachObs4", "coachObs5"].every(key => d[`${key}Answer`])
        && d.intuitive && d.useful
      : tool.key === "calendrier"
        ? d.calendarGoogleAddDone
          && d.calendarGoogleShow
          && d.calendarSerenzerClickDone
          && d.calendarSerenzerCreateDone
          && d.calendarSerenzerShow
          && d.calendarGoogleSync
          && d.intuitive
          && d.useful
      : tool.key === "rituels"
        ? d.ritualNewActionDone
          && d.ritualNewWorks
          && String(d.ritualNewSense || "").trim()
          && d.ritualNewCalendar
          && d.ritualNewMine
          && d.ritualAiOpenDone
          && d.ritualAiLoad
          && String(d.ritualAiSense || "").trim()
          && d.ritualAiAcceptDone
          && d.ritualAiCalendar
          && d.ritualAiMine
          && d.intuitive
          && d.useful
      : d.intuitive && d.useful;
  const btn  = document.getElementById("tool-submit-btn");
  const hint = document.querySelector(".field-hint");
  if (btn) btn.disabled = !isValid;
  if (isValid && hint) hint.remove();
  if (!isValid && !hint && btn && tool.key === "tableauIntro") {
    btn.insertAdjacentHTML("afterend", `<p class="field-hint">${t("dashboardIntroRequired")}</p>`);
  }
  if (!isValid && !hint && btn && tool.key === "coach") {
    btn.insertAdjacentHTML("afterend", `<p class="field-hint">${t("coachRequired")}</p>`);
  }
  if (!isValid && !hint && btn && tool.key === "calendrier") {
    btn.insertAdjacentHTML("afterend", `<p class="field-hint">${t("calendarRequired")}</p>`);
  }
  if (!isValid && !hint && btn && tool.key === "rituels") {
    btn.insertAdjacentHTML("afterend", `<p class="field-hint">${t("ritualRequired")}</p>`);
  }
}

// ── Shared components ─────────────────────────────────────────────────────────

function starRatingHTML(label, value, ratingKey) {
  return `
    <div class="star-rating" data-rating-key="${ratingKey}">
      <label class="field-label">${label}</label>
      <div class="stars">
        ${[1,2,3,4,5].map(star => `
          <button class="star-btn ${star <= (value || 0) ? "active" : ""}" data-star="${star}">★</button>
        `).join("")}
      </div>
    </div>
  `;
}

function checkboxGroupHTML(label, options, values, single, key) {
  return `
    <div class="checkbox-group" data-group-key="${key}">
      <label class="field-label">${label}</label>
      <div class="checkbox-options">
        ${options.map(opt => {
          const checked = single
            ? values === opt.value
            : (Array.isArray(values) && values.includes(opt.value));
          return `
            <label class="checkbox-option ${checked ? "checked" : ""}">
              <input type="${single ? "radio" : "checkbox"}" name="${key}" value="${opt.value}" ${checked ? "checked" : ""}>
              <span class="checkbox-option-label">${opt.label}</span>
            </label>
          `;
        }).join("")}
      </div>
    </div>
  `;
}

function yesNoOptions() {
  return [
    { value: "yes", label: t("yesOption") },
    { value: "no",  label: t("noOption") },

}

// ── SERVER INTEGRATION ───────────────────────────────────────────────────────
//
// 1. Replace the body of submitToServer() with your fetch/axios call.
// 2. That's it — buildPayload() and the call site in markComplete() are wired up.
//
// submitToServer() is called after every tab submission.
  // When the user completes all 11 tabs, payload.isComplete is true.
//
// Full payload shape:
// {
//   lang:         string,           // "fr" | "en" | "it" | "nl" | "de" | "es"
  //   isComplete:   boolean,          // true only when all 11 tabs are done
//   onboarding: {
//     firstName:        string,
//     lastName:         string,
//     email:            string,
//     invitationNumber: string,
//     tech:             "beginner" | "intermediate" | "advanced",
//     devices:          Array<"iphone" | "android" | "web">,
//     time:             "lt1h" | "1to3h" | "3hplus",
//     hopes:            string,
//   },
//   tools: {
  //     [toolKey: string]: {          // keys: tableauIntro, coach, rituels, challenges,
  //       intuitive:   number,        //   calendrier, organisation, progression, notifications, tableauFinal
//       useful:      number,        // intuitive + useful: 1–5 star rating
//       experience:  Array<"perfect" | "bug" | "confused" | "loved">,
//       description: string,
//       suggestions: string,
//     }
//   },
//   completedTabs: number[],        // tab IDs submitted so far, e.g. [1, 2, 3]
// }

function buildPayload() {
  const isComplete = Object.keys(state.completed).length === 11;
  return {
    lang:          state.lang,
    isComplete,
    onboarding:    { ...state.onboardingData },
    tools:         { ...state.toolData },
    completedTabs: Object.keys(state.completed).map(Number),
  };
}

function handleTabClick(tabId) {
  if (isLocked(tabId)) return;
  state.activeTab = tabId;
  state.mobileOpen = false;
  renderAll();
}

function markComplete(tabId) {
  state.completed[tabId] = true;
  persistNow();
  setAutosaveStatus("saved");
  submitToServer(buildPayload());
  if (tabId < 11) state.activeTab = tabId + 1;
  renderAll();
}

// ── Countdown ────────────────────────────────────────────────────────────────
// May 10 2026 at 22:00 CEST (UTC+2) = 20:00 UTC
const DEFAULT_DEADLINE_ISO = "2026-05-10T20:00:00Z";
let DEADLINE = new Date(DEFAULT_DEADLINE_ISO);

function deadlineLocale() {
  return {
    fr: "fr-FR",
    en: "en-GB",
    it: "it-IT",
    nl: "nl-NL",
    de: "de-DE",
    es: "es-ES",
  }[state.lang] || "en-GB";
}

function formatDeadlineDate() {
  return new Intl.DateTimeFormat(deadlineLocale(), {
    dateStyle: "long",
    timeStyle: "short",
    timeZone: "Europe/Amsterdam",
  }).format(DEADLINE);
}

function formatCountdown() {
  const diff = DEADLINE - Date.now();
  if (diff <= 0) return t("sessionEnded");
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  return d > 0
    ? `${d}${t("cdDays")} ${h}${t("cdHours")} ${m}${t("cdMinutes")}`
    : `${h}${t("cdHours")} ${m}${t("cdMinutes")} ${s}${t("cdSeconds")}`;
}

function updateCountdown() {
  const text = formatCountdown();
  document.querySelectorAll(".countdown-timer").forEach(el => el.textContent = text);
}

function setDebugDeadline() {
  DEADLINE = new Date(Date.now() + 10 * 60000);
  renderAll();
  updateCountdown();
}

function resetDebugDeadline() {
  DEADLINE = new Date(DEFAULT_DEADLINE_ISO);
  renderAll();
  updateCountdown();
}
