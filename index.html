<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Serenzer Beta Feedback</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-inner" id="sidebar-inner"></div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="topbar-left">
        <button class="hamburger" id="hamburger-btn">☰</button>
        <span class="topbar-title" id="topbar-title"></span>
      </div>
      <div class="topbar-right">
        <span class="progress-text" id="progress-text"></span>
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <select class="lang-select" id="lang-select">
          <option value="fr">🇫🇷 FR</option>
          <option value="en">🇬🇧 EN</option>
          <option value="it">🇮🇹 IT</option>
          <option value="nl">🇳🇱 NL</option>
          <option value="de">🇩🇪 DE</option>
          <option value="es">🇪🇸 ES</option>
        </select>
      </div>
    </div>

    <div class="content-area">
      <div id="tab-content"></div>
    </div>
  </main>

  <div class="overlay hidden" id="overlay"></div>

  <!-- Language splash (first visit only) -->
  <div class="lang-splash hidden" id="lang-splash">
    <div class="lang-splash-card" id="lang-splash-card"></div>
  </div>

  <aside class="mobile-sidebar hidden" id="mobile-sidebar">
    <div class="mobile-sidebar-header">
      <button class="close-btn" id="close-sidebar-btn">✕</button>
    </div>
    <div class="sidebar-inner" id="mobile-sidebar-inner"></div>
  </aside>

  <div class="bug-report-modal hidden" id="bug-report-modal">
    <div class="bug-report-backdrop" id="bug-report-backdrop"></div>
    <div class="bug-report-card">
      <h2 class="section-title bug-report-title" id="bug-report-title"></h2>
      <p class="bug-report-body" id="bug-report-body"></p>
      <textarea class="textarea-input bug-report-textarea" id="bug-report-input" rows="5"></textarea>
      <div class="bug-report-actions">
        <button class="ghost-btn" id="bug-report-cancel-btn" type="button"></button>
        <button class="submit-btn" id="bug-report-submit-btn" type="button"></button>
      </div>
      <div class="field-hint" id="bug-report-status"></div>
    </div>
  </div>

  <div class="debug-menu" id="debug-menu">
    <div class="debug-menu-panel hidden" id="debug-menu-panel">
      <a class="debug-admin-btn" href="admin.html" target="_blank" rel="noreferrer">
        ADMIN
        <span>Open live feedback dashboard</span>
      </a>

      <button class="debug-invite-btn" id="debug-invite-btn" type="button">
        TEMP BYPASS INVITE
        <span>Skip invitation code for testing</span>
      </button>

      <button class="debug-unlock-btn" id="debug-unlock-btn" type="button">
        TEMP UNLOCK ALL TABS
        <span>Bypass steps 1 and 2 for testing</span>
      </button>

      <button class="debug-deadline-btn" id="debug-deadline-btn" type="button">
        TEMP TEST SESSION END
        <span>Push deadline forward for countdown test</span>
      </button>

      <button class="debug-deadline-reset-btn" id="debug-deadline-reset-btn" type="button">
        TEMP RESET SESSION END
        <span>Restore May 10 at 22:00 CEST</span>
      </button>

      <button class="debug-wipe-btn" id="debug-wipe-btn" type="button">
        TEMP WIPE EVERYTHING
        <span>Remove before publishing</span>
      </button>
    </div>

    <button class="debug-menu-toggle" id="debug-menu-toggle" type="button" aria-label="Open debug menu" aria-expanded="false">
      <span class="debug-menu-icon">!</span>
    </button>
  </div>

</div>

// ── State ─────────────────────────────────────────────────────────────────────

const STORAGE_KEY = "serenzer_feedback_v2";
function makeSubmissionId() {
  if (window.crypto?.randomUUID) return window.crypto.randomUUID();
  return `sub_${Date.now()}_${Math.random().toString(36).slice(2, 10)}`;
}

function hasMeaningfulProgress() {
  return state.invitationValidated
    || Object.keys(state.completed).length > 0
    || Object.keys(state.onboardingData).some(key => String(state.onboardingData[key] || "").trim())
    || Object.keys(state.toolData).some(key => Object.keys(state.toolData[key] || {}).length > 0);
}

const state = {
  activeTab: 1,
  completed: {},
  onboardingData: {},
  toolData: {},
  invitationValidated: false,
  inviteNeedsLastName: false,
  inviteDraftCode: "",
  inviteLastNameDraft: "",
  submissionId: makeSubmissionId(),
  mobileOpen: false,
  debugMenuOpen: false,
  debugUnlockAllTabs: false,
  debugEnabled: false,
  bugModalOpen: false,
  lang: "en",
  langSelected: false,
  autosaveStatus: "saved",
};

let autosaveTimer = null;
let remoteSyncToken = 0;
let invitationRestorePromise = null;

// ── Translation helper ────────────────────────────────────────────────────────

function t(key) {
  return T[state.lang]?.[key] ?? T.fr[key] ?? key;
}

function toolT(key) {
  return T[state.lang]?.tools?.[key] ?? T.fr.tools[key];
}

function getNavTabs() {
  return [
    { id: 1, label: t("tabTutorial"),   icon: "·" },
    { id: 2, label: t("tabOnboarding"), icon: "·" },
    ...TOOLS.map(tool => ({ id: tool.id, label: toolT(tool.key).label, icon: tool.icon })),
  ];
}

// ── Storage ───────────────────────────────────────────────────────────────────

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      state.completed      = saved.completed      || {};
      state.onboardingData = saved.onboardingData || {};
      state.toolData       = saved.toolData       || {};
      state.invitationValidated = !!saved.invitationValidated;
      state.submissionId   = saved.submissionId   || makeSubmissionId();
      if (saved.lang && T[saved.lang]) state.lang = saved.lang;
      if (saved.langSelected) state.langSelected = true;
    }
  } catch (_) {}
}

function hydrateFromExistingSubmission(detail) {
  if (!detail || typeof detail !== "object") return;
  state.submissionId = detail.submissionId || state.submissionId;
  state.lang = detail.lang && T[detail.lang] ? detail.lang : state.lang;
  state.onboardingData = { ...(detail.onboarding || {}) };
  state.toolData = { ...(detail.tools || {}) };
  state.completed = {};
  (detail.completedTabs || []).forEach(tabId => {
    state.completed[Number(tabId)] = true;
  });
  state.invitationValidated = true;
  const firstIncomplete = Array.from({ length: TOTAL_TABS }, (_, i) => i + 1).find(tabId => !state.completed[tabId]);
  state.activeTab = firstIncomplete || TOTAL_TABS;
}

async function persistNow() {
  clearTimeout(autosaveTimer);
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      completed:      state.completed,
      onboardingData: state.onboardingData,
      toolData:       state.toolData,
      invitationValidated: state.invitationValidated,
      submissionId:   state.submissionId,
      lang:           state.lang,
      langSelected:   state.langSelected,
    }));
  } catch (_) {}

  if (!hasMeaningfulProgress()) {
    setAutosaveStatus("saved");
    return true;
  }

  const token = ++remoteSyncToken;
  const ok = await submitToServer(buildPayload());
  if (token === remoteSyncToken && ok) {
    setAutosaveStatus("saved");
  }
  return ok;
}

async function clearInvitationSession() {
  try {
    await fetch("/api/invitations/session/clear", { method: "POST" });
  } catch (_) {}
}

async function submitBugReport(message) {
  const activeTab = getNavTabs().find(tab => tab.id === state.activeTab);
  try {
    const res = await fetch("/api/bug-reports", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        submissionId: state.submissionId,
        lang: state.lang,
        onboarding: state.onboardingData,
        activeTab: state.activeTab,
        activeTabLabel: activeTab?.label || "",
        pageUrl: window.location.href,
        userAgent: navigator.userAgent,
        message,
      }),
    });
    return { ok: res.ok, data: await res.json().catch(() => ({})) };
  } catch (_) {
    return { ok: false, data: {} };
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────

function totalCompleted() { return Object.keys(state.completed).length; }
function progressPct()    { return Math.round((totalCompleted() / TOTAL_TABS) * 100); }
function isLocked(tabId)  { return !state.debugUnlockAllTabs && tabId >= 3 && !(state.completed[1] && state.completed[2]); }
function shouldEnableDebugMenu() {
  const host = window.location.hostname;
  const params = new URLSearchParams(window.location.search);
  return params.get("debug") === "1"
    || window.location.protocol === "file:"
    || host === "localhost"
    || host === "127.0.0.1";
}

function getTabStatus(tabId) {
  if (state.completed[tabId]) return "done";
  if (isLocked(tabId))        return "locked";
  return "open";
}

function esc(str) {
  return String(str || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function autosaveIndicatorHTML() {
  const isSaved = state.autosaveStatus === "saved";
  return `
    <span
      class="autosave-indicator ${isSaved ? "saved" : "saving"}"
      aria-label="${isSaved ? "Saved" : "Saving"}"
      role="status"
    >
      ${checkIconSVG("autosave-check-icon")}
    </span>
  `;
}

function checkIconSVG(className = "") {
  return `
    <svg class="${className}" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <path d="M6.8 12.6L10.5 16.3L18 8.7" />
    </svg>
  `;
}

function doneBadgeHTML(className = "") {
  return `
    <span class="status-badge status-badge-done ${className}">
      ${checkIconSVG("status-badge-check")}
    </span>
  `;
}

function emailIconSVG(className = "") {
  return `
    <svg class="${className}" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <path d="M4 7.5H20V16.5H4Z" />
      <path d="M4.8 8.1L12 13.3L19.2 8.1" />
    </svg>
  `;
}

function updateAutosaveIndicators() {
  const isSaved = state.autosaveStatus === "saved";
  document.querySelectorAll(".autosave-indicator").forEach(el => {
    el.classList.toggle("saved", isSaved);
    el.classList.toggle("saving", !isSaved);
    el.setAttribute("aria-label", isSaved ? "Saved" : "Saving");
  });
}

function setAutosaveStatus(status) {
  state.autosaveStatus = status;
  updateAutosaveIndicators();
}

function schedulePersist() {
  setAutosaveStatus("saving");
  clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(async () => {
    await persistNow();
  }, 1500);
}

function resetAppState() {
  clearTimeout(autosaveTimer);
  localStorage.removeItem(STORAGE_KEY);
  clearInvitationSession();

  state.activeTab = 1;
  state.completed = {};
  state.onboardingData = {};
  state.toolData = {};
  state.invitationValidated = false;
  state.submissionId = makeSubmissionId();
  state.mobileOpen = false;
  state.debugMenuOpen = false;
  state.debugUnlockAllTabs = false;
  state.bugModalOpen = false;
  state.lang = "en";
  state.langSelected = false;
  state.autosaveStatus = "saved";

  document.documentElement.lang = state.lang;
  renderAll();
  renderSplash();
  document.getElementById("lang-splash").classList.remove("hidden");
}

function navItemHTML(tab) {
  const status   = getTabStatus(tab.id);
  const isActive = state.activeTab === tab.id;
  const cls      = ["nav-item", isActive ? "active" : "", status === "locked" ? "locked" : ""].filter(Boolean).join(" ");
  const statusIcon = status === "done" ? doneBadgeHTML("nav-item-status")
                   : status === "locked" ? `<span class="nav-item-status nav-item-status-locked">-</span>` : "";
  return `
    <button class="${cls}" data-tab-id="${tab.id}">
      <span class="nav-item-label">${tab.label}</span>
      ${statusIcon}
    </button>
  `;
}

  const container = document.getElementById("tab-content");
  if (!container) return;

  if (!state.invitationValidated) {
    container.innerHTML = invitationHTML();
    attachInvitationListeners();

  } else if (state.activeTab === 1) {
    container.innerHTML = tutorielHTML();
    document.getElementById("tutoriel-start-btn").addEventListener("click", () => markComplete(1));

  } else if (state.activeTab === 2) {
    container.innerHTML = onboardingHTML();
    attachOnboardingListeners();

  } else {
    const tool = TOOLS.find(tl => tl.id === state.activeTab);
    if (tool) {
      container.innerHTML = toolTabHTML(tool);
      attachToolListeners(tool);
    }
  }
}

function attachOnboardingListeners() {
  ["firstName", "lastName", "email", "hopes"].forEach(field => {
    const el = document.getElementById(`inp-${field}`);
    if (!el) return;
    el.addEventListener("input", () => {
      state.onboardingData[field] = el.value;
      schedulePersist();
      refreshOnboardingSubmit();
    });
  });

  document.querySelectorAll(".checkbox-group").forEach(group => {
    const key = group.dataset.groupKey;
    group.querySelectorAll("input").forEach(input => {
      input.addEventListener("change", () => {
        if (input.type === "radio") {
          state.onboardingData[key] = input.value;
        } else {
          const cur = state.onboardingData[key] || [];
          state.onboardingData[key] = input.checked
            ? [...cur, input.value]
            : cur.filter(v => v !== input.value);
        }
        group.querySelectorAll(".checkbox-option").forEach(lbl => {
          lbl.classList.toggle("checked", lbl.querySelector("input").checked);
        });
        schedulePersist();
        refreshOnboardingSubmit();
      });
    });
  });

  document.getElementById("onboarding-submit-btn")?.addEventListener("click", () => markComplete(2));
}

function attachInvitationListeners() {
  const input = document.getElementById("inp-invitation-gate");
  const lastNameInput = document.getElementById("inp-invitation-last-name");
  const status = document.getElementById("invite-status-text");
  const button = document.getElementById("invite-submit-btn");
  if (!input || !status || !button) return;

  input.addEventListener("input", () => {
    state.inviteDraftCode = input.value;
    state.inviteNeedsLastName = false;
    state.inviteLastNameDraft = "";
    status.textContent = t("inviteHint");
  });

  lastNameInput?.addEventListener("input", () => {
    state.inviteLastNameDraft = lastNameInput.value;
    status.textContent = t("inviteNeedLastName");
  });

  button.addEventListener("click", async () => {
    const code = String(input.value || "").trim().toUpperCase();
    if (!code) {
      status.textContent = t("inviteErrorRequired");
      return;
    }
    if (state.inviteNeedsLastName && !String(lastNameInput?.value || "").trim()) {
      status.textContent = t("inviteNeedLastName");
      return;
    }

    button.disabled = true;
    status.textContent = t("inviteValidating");

    const result = await validateInvitationCode(code);
    if (!result.ok) {
      if (result.data?.requiresLastName) {
        state.inviteNeedsLastName = true;
        state.inviteDraftCode = code;
        state.inviteLastNameDraft = String(lastNameInput?.value || state.inviteLastNameDraft || "");
        renderAll();
        document.getElementById("invite-status-text").textContent = result.data?.error || t("inviteNeedLastName");
        document.getElementById("inp-invitation-last-name")?.focus();
        return;
      }
      status.textContent = result.data?.error || t("inviteErrorInvalid");
      button.disabled = false;
      return;
    }

    if (result.data?.existingSubmission) {
      hydrateFromExistingSubmission(result.data.existingSubmission);
    } else if (result.data?.submissionId) {
      state.submissionId = result.data.submissionId;
    }
    state.onboardingData.invitationNumber = result.data.code || code;
    state.invitationValidated = true;
    state.inviteNeedsLastName = false;
    state.inviteDraftCode = "";
    state.inviteLastNameDraft = "";
    setAutosaveStatus("saving");
    await persistNow();
    renderAll();
  });
}

function refreshOnboardingSubmit() {
  const d = state.onboardingData;
  const isValid = d.firstName && d.lastName && d.email && d.tech && (d.devices || []).length > 0 && d.time
    && d.ageRange && d.gender && d.workSituation && d.livingSituation && d.familySituation;
  const btn  = document.getElementById("onboarding-submit-btn");
  const hint = document.querySelector(".field-hint");
  if (btn) btn.disabled = !isValid;
  if (isValid && hint) hint.remove();
  if (!isValid && !hint && btn) {
    btn.insertAdjacentHTML("afterend", `<p class="field-hint">${t("requiredFields")}</p>`);
  }
}

function attachToolListeners(tool) {
  const key = tool.key;
  if (key === "coach") {
    attachCoachListeners(tool);
    return;
  }

  document.querySelectorAll(".star-rating").forEach(ratingEl => {
    const ratingKey = ratingEl.dataset.ratingKey;
    ratingEl.querySelectorAll(".star-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const val = parseInt(btn.dataset.star);
        if (!state.toolData[key]) state.toolData[key] = {};
        state.toolData[key][ratingKey] = val;
        schedulePersist();
        ratingEl.querySelectorAll(".star-btn").forEach(s => {
          s.classList.toggle("active", parseInt(s.dataset.star) <= val);
        });
        refreshToolSubmit(tool);
      });
    });
  });

  document.querySelectorAll(".checkbox-group").forEach(group => {
    const groupKey = group.dataset.groupKey;
    const isSingle = !!group.querySelector('input[type="radio"]');
    group.querySelectorAll("input").forEach(input => {
      input.addEventListener("change", () => {
        if (!state.toolData[key]) state.toolData[key] = {};
        if (isSingle) {
          const checked = group.querySelector("input:checked");
          state.toolData[key][groupKey] = checked ? checked.value : "";
        } else {
          const cur = state.toolData[key][groupKey] || [];
          state.toolData[key][groupKey] = input.checked
            ? [...cur, input.value]
            : cur.filter(v => v !== input.value);
        }
        group.querySelectorAll(".checkbox-option").forEach(lbl => {
          lbl.classList.toggle("checked", lbl.querySelector("input").checked);
        });
        schedulePersist();
        refreshToolSubmit(tool);
      });
    });
  });

  ["description", "suggestions"].forEach(field => {
    const el = document.getElementById(`inp-${field}`);
    if (!el) return;
    el.addEventListener("input", () => {
      if (!state.toolData[key]) state.toolData[key] = {};
      state.toolData[key][field] = el.value;
      schedulePersist();
    });
  });

  if (tool.key === "tableauIntro") {
    const detailsEl = document.getElementById("inp-pageDetailsSense");
    detailsEl?.addEventListener("input", () => {
      if (!state.toolData[key]) state.toolData[key] = {};
      state.toolData[key].pageDetailsSense = detailsEl.value;
      schedulePersist();
      refreshToolSubmit(tool);
    });
  }

  if (tool.key === "calendrier") {
    document.querySelectorAll("[data-calendar-task]").forEach(input => {
      input.addEventListener("change", () => {
        if (!state.toolData[key]) state.toolData[key] = {};
        state.toolData[key][input.dataset.calendarTask] = input.checked;
        input.closest(".coach-action-item")?.classList.toggle("checked", input.checked);
        schedulePersist();
        refreshToolSubmit(tool);
      });
    });
  }

  if (tool.key === "rituels") {
    document.querySelectorAll("[data-ritual-task]").forEach(input => {
      input.addEventListener("change", () => {
        if (!state.toolData[key]) state.toolData[key] = {};
        state.toolData[key][input.dataset.ritualTask] = input.checked;
        input.closest(".coach-action-item")?.classList.toggle("checked", input.checked);
        schedulePersist();
        refreshToolSubmit(tool);
      });
    });

    ["ritualNewSense", "ritualAiSense"].forEach(field => {
      const el = document.getElementById(`inp-${field}`);
      if (!el) return;
      el.addEventListener("input", () => {
        if (!state.toolData[key]) state.toolData[key] = {};
        state.toolData[key][field] = el.value;
        schedulePersist();
        refreshToolSubmit(tool);
      });
    });
  }

  document.querySelectorAll("[data-generic-task]").forEach(input => {
    input.addEventListener("change", () => {
      if (!state.toolData[key]) state.toolData[key] = {};
      state.toolData[key][input.dataset.genericTask] = input.checked;
      input.closest(".coach-action-item")?.classList.toggle("checked", input.checked);
      schedulePersist();
      refreshToolSubmit(tool);
    });
  });

  [
    "challengesRelevant",
    "progressionSense",
    "dashboardFinalSense",
    "finalThoughtsEssay",
  ].forEach(field => {
    const el = document.getElementById(`inp-${field}`);
    if (!el) return;
    el.addEventListener("input", () => {
      if (!state.toolData[key]) state.toolData[key] = {};
      state.toolData[key][field] = el.value;
      schedulePersist();
      refreshToolSubmit(tool);
    });
  });

  document.getElementById("tool-submit-btn")?.addEventListener("click", () => {
    const fields = tool.key === "tableauIntro"
      ? ["description", "suggestions", "pageDetailsSense"]
      : tool.key === "calendrier"
        ? ["description", "suggestions"]
      : tool.key === "rituels"
        ? ["description", "suggestions", "ritualNewSense", "ritualAiSense"]
        : tool.key === "challenges"
          ? ["description", "suggestions", "challengesRelevant"]
        : tool.key === "progression"
          ? ["description", "suggestions", "progressionSense"]
        : tool.key === "tableauFinal"
          ? ["description", "suggestions", "dashboardFinalSense"]
        : tool.key === "finalThoughts"
          ? ["finalThoughtsEssay"]
        : ["description", "suggestions"];

    fields.forEach(field => {
      const el = document.getElementById(`inp-${field}`);
      if (el) {
        if (!state.toolData[key]) state.toolData[key] = {};
        state.toolData[key][field] = el.value;
      }
    });
    markComplete(state.activeTab);
  });
}

function isToolValid(toolKey, d) {
  switch (toolKey) {
    case "tableauIntro":
      return d.intuitive && d.useful && d.dateTimeCorrect && d.greetingMatchesTime && d.startConversationWorks && String(d.pageDetailsSense || "").trim();
    case "coach":
      return ["coachAction1Done", "coachAction2Done", "coachAction3Done"].every(key => !!d[key])
        && ["coachObs1", "coachObs2", "coachObs3", "coachObs4", "coachObs5"].every(key => d[`${key}Answer`])
        && d.intuitive && d.useful && d.genericToolSense;
    case "calendrier":
      return d.calendarGoogleAddDone
        && d.calendarGoogleShow
        && d.calendarSerenzerClickDone
        && d.calendarSerenzerCreateDone
        && d.calendarSerenzerShow
        && d.calendarGoogleSync
        && d.intuitive
        && d.useful
        && d.genericToolSense;
    case "rituels":
      return d.ritualNewActionDone
        && d.ritualNewWorks
        && String(d.ritualNewSense || "").trim()
        && d.ritualNewCalendar
        && d.ritualNewMine
        && d.ritualAiOpenDone
        && d.ritualAiLoad
        && String(d.ritualAiSense || "").trim()
        && d.ritualAiAcceptDone
        && d.ritualAiCalendar
        && d.ritualAiMine
        && d.intuitive
        && d.useful
        && d.genericToolSense;
    case "challenges":
      return d.challengesOpenDone
        && d.challengesJoinDone
        && String(d.challengesRelevant || "").trim()
        && d.challengesClear
        && d.challengesProgress
        && d.intuitive
        && d.useful;
    case "organisation":
      return d.organisationProjectCreateDone
        && d.organisationProjectChooseDone
        && d.organisationProjectWeekDone
        && d.organisationProjectAskDone
        && d.organisationProjectCalendar
        && d.organisationUseTellDone
        && d.organisationUseContext
        && d.organisationUseBuildDone
        && d.organisationFinaliseWrapDone
        && d.organisationFinaliseWorks
        && (d.organisationFinaliseWorks !== "no" || d.organisationFinaliseClickDone)
        && d.organisationFinaliseReport
        && d.organisationFinaliseSense
        && d.organisationFinaliseCalendar
        && d.intuitive
        && d.useful
        && d.genericToolSense;
    case "progression":
      return d.progressionOpenDone
        && d.progressionLoad
        && d.progressionCoherent
        && String(d.progressionSense || "").trim()
        && d.progressionMotivate
        && d.intuitive
        && d.useful
        && d.genericToolSense;
    case "tableauFinal":
      return d.dashboardFinalReturnDone
        && d.dashboardFinalPersonal
        && d.dashboardFinalUseful
        && String(d.dashboardFinalSense || "").trim()
        && d.dashboardFinalReflect
        && d.intuitive
        && d.useful;
    case "finalThoughts":
      return String(d.finalThoughtsEssay || "").trim().length >= 20;
    case "closing":
      return true;
    default:
      return d.intuitive && d.useful;
  }
}

function refreshToolSubmit(tool) {
  const d = state.toolData[tool.key] || {};
  const isValid = isToolValid(tool.key, d);
  const btn  = document.getElementById("tool-submit-btn");
  const hint = document.querySelector(".field-hint");
  if (btn) btn.disabled = !isValid;
  if (isValid && hint) hint.remove();
  if (!isValid && !hint && btn && tool.key === "tableauIntro") {
    btn.insertAdjacentHTML("afterend", `<p class="field-hint">${t("dashboardIntroRequired")}</p>`);
  }
  if (!isValid && !hint && btn && tool.key === "coach") {
    btn.insertAdjacentHTML("afterend", `<p class="field-hint">${t("coachRequired")}</p>`);
  }
  if (!isValid && !hint && btn && tool.key === "calendrier") {
    btn.insertAdjacentHTML("afterend", `<p class="field-hint">${t("calendarRequired")}</p>`);
  }
  if (!isValid && !hint && btn && tool.key === "rituels") {
    btn.insertAdjacentHTML("afterend", `<p class="field-hint">${t("ritualRequired")}</p>`);
  }
  if (!isValid && !hint && btn && tool.key === "challenges") {
    btn.insertAdjacentHTML("afterend", `<p class="field-hint">${t("challengesRequired")}</p>`);
  }
  if (!isValid && !hint && btn && tool.key === "organisation") {
    btn.insertAdjacentHTML("afterend", `<p class="field-hint">${t("organisationRequired")}</p>`);
  }
  if (!isValid && !hint && btn && tool.key === "progression") {
    btn.insertAdjacentHTML("afterend", `<p class="field-hint">${t("progressionRequired")}</p>`);
  }
  if (!isValid && !hint && btn && tool.key === "tableauFinal") {
    btn.insertAdjacentHTML("afterend", `<p class="field-hint">${t("dashboardFinalRequired")}</p>`);
  }
  if (!isValid && !hint && btn && tool.key === "finalThoughts") {
    btn.insertAdjacentHTML("afterend", `<p class="field-hint">${t("finalThoughtsRequired")}</p>`);
  }
}

function starRatingHTML(label, value, ratingKey) {
  return `
    <div class="star-rating" data-rating-key="${ratingKey}">
      <label class="field-label">${label}</label>
      <div class="stars">
        ${[1,2,3,4,5].map(star => `
          <button class="star-btn ${star <= (value || 0) ? "active" : ""}" data-star="${star}">★</button>
        `).join("")}
      </div>
    </div>
  `;
}

function checkboxGroupHTML(label, options, values, single, key) {
  return `
    <div class="checkbox-group" data-group-key="${key}">
      <label class="field-label">${label}</label>
      <div class="checkbox-options">
        ${options.map(opt => {
          const checked = single
            ? values === opt.value
            : (Array.isArray(values) && values.includes(opt.value));
          return `
            <label class="checkbox-option ${checked ? "checked" : ""}">
              <input type="${single ? "radio" : "checkbox"}" name="${key}" value="${opt.value}" ${checked ? "checked" : ""}>
              <span class="checkbox-option-label">${opt.label}</span>
            </label>
          `;
        }).join("")}
      </div>
    </div>
  `;
}

function yesNoOptions() {
  return [
    { value: "yes", label: t("yesOption") },
    { value: "no",  label: t("noOption") },
  ];
}

// ── SERVER INTEGRATION ───────────────────────────────────────────────────────
//
// 1. Replace the body of submitToServer() with your fetch/axios call.
// 2. That's it — buildPayload() and the call site in markComplete() are wired up.
//
// submitToServer() is called after every tab submission.
  // When the user completes all tabs, payload.isComplete is true.
//
// Full payload shape:
// {
//   lang:         string,           // "fr" | "en" | "it" | "nl" | "de" | "es"
  //   isComplete:   boolean,          // true only when all tabs are done
//   onboarding: {
//     firstName:        string,
//     lastName:         string,
//     email:            string,
//     invitationNumber: string,
//     tech:             "beginner" | "intermediate" | "advanced",
//     devices:          Array<"iphone" | "android" | "web">,
//     time:             "lt1h" | "1to3h" | "3hplus",
//     hopes:            string,
//   },
//   tools: {
  //     [toolKey: string]: {          // keys: tableauIntro, coach, rituels, challenges,
  //       intuitive:   number,        //   calendrier, organisation, progression, tableauFinal
//       useful:      number,        // intuitive + useful: 1–5 star rating
//       experience:  Array<"perfect" | "bug" | "confused" | "loved">,
//       description: string,
//       suggestions: string,
//     }
//   },
//   completedTabs: number[],        // tab IDs submitted so far, e.g. [1, 2, 3]
// }

function buildPayload() {
  const isComplete = Object.keys(state.completed).length === TOTAL_TABS;
  return {
    submissionId:  state.submissionId,
    lang:          state.lang,
    isComplete,
    onboarding:    { ...state.onboardingData },
    tools:         { ...state.toolData },
    completedTabs: Object.keys(state.completed).map(Number),
  };
}

async function submitToServer(payload) {
  try {
    const res = await fetch("/api/feedback", {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify(payload),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return true;
  } catch (err) {
    console.error("[Serenzer] feedback submit failed:", err);
    return false;
  }
}

async function validateInvitationCode(code) {
  try {
    const res = await fetch("/api/invitations/validate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        submissionId: state.submissionId,
        code,
        lastName: String(state.inviteLastNameDraft || "").trim() || undefined,
      }),
    });
    const data = await res.json().catch(() => ({}));
    return { ok: res.ok, data };
  } catch (_) {
    return { ok: false, data: { error: t("inviteErrorInvalid") } };
  }
}

async function restoreInvitationSession() {
  if (state.invitationValidated) return true;
  if (invitationRestorePromise) return invitationRestorePromise;

  invitationRestorePromise = (async () => {
    try {
      const res = await fetch("/api/invitations/session/restore", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          submissionId: state.submissionId,
        }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) return false;
      if (data.existingSubmission) {
        hydrateFromExistingSubmission(data.existingSubmission);
      } else if (data.submissionId) {
        state.submissionId = data.submissionId;
        state.invitationValidated = true;
      }
      state.onboardingData.invitationNumber = data.code || state.onboardingData.invitationNumber || "";
      await persistNow();
      return true;
    } catch (_) {
      return false;
    } finally {
      invitationRestorePromise = null;
    }
  })();

  return invitationRestorePromise;
}

// ── Navigation ────────────────────────────────────────────────────────────────

function handleTabClick(tabId) {
  if (!state.invitationValidated) return;
  if (isLocked(tabId)) return;
  state.activeTab = tabId;
  state.mobileOpen = false;
  renderAll();
}

function markComplete(tabId) {
  state.completed[tabId] = true;
  setAutosaveStatus("saving");
  persistNow();
  if (tabId < TOTAL_TABS) state.activeTab = tabId + 1;
  renderAll();
}

// ── Full render ───────────────────────────────────────────────────────────────

function renderAll() {
  updateTopBar();
  renderSidebarContent("sidebar-inner");
  renderSidebarContent("mobile-sidebar-inner");
  renderContent();
  updateAutosaveIndicators();

  document.getElementById("overlay").classList.toggle("hidden", !state.mobileOpen);
  document.getElementById("mobile-sidebar").classList.toggle("hidden", !state.mobileOpen);
  document.getElementById("debug-menu").classList.toggle("hidden", !state.debugEnabled);
  document.getElementById("debug-menu-panel").classList.toggle("hidden", !state.debugMenuOpen);
  document.getElementById("debug-menu-toggle").setAttribute("aria-expanded", state.debugMenuOpen ? "true" : "false");
  document.getElementById("bug-report-modal").classList.toggle("hidden", !state.bugModalOpen);
  document.getElementById("bug-report-title").textContent = t("reportBugTitle");
  document.getElementById("bug-report-body").textContent = t("reportBugBody");
  document.getElementById("bug-report-input").placeholder = t("reportBugPlaceholder");
  document.getElementById("bug-report-cancel-btn").textContent = t("reportBugCancel");
  document.getElementById("bug-report-submit-btn").textContent = t("reportBugSubmit");
}

function openBugReportModal() {
  state.bugModalOpen = true;
  renderAll();
  document.getElementById("bug-report-status").textContent = "";
  document.getElementById("bug-report-input").focus();
}

function closeBugReportModal() {
  state.bugModalOpen = false;
  renderAll();
}

// ── Language splash ───────────────────────────────────────────────────────────

const SPLASH_LANGS = [
  { code: "fr", flag: "🇫🇷", name: "Français" },
  { code: "en", flag: "🇬🇧", name: "English" },
  { code: "it", flag: "🇮🇹", name: "Italiano" },
  { code: "nl", flag: "🇳🇱", name: "Nederlands" },
  { code: "de", flag: "🇩🇪", name: "Deutsch" },
  { code: "es", flag: "🇪🇸", name: "Español" },
];

function renderSplash() {
  const card = document.getElementById("lang-splash-card");
  if (!card) return;

  card.innerHTML = `
    <img src="https://apps.serenzer.com/static/serenzer_wave.png" alt="Serenzer"
      style="height:48px;border-radius:10px;display:block;margin:0 auto 20px;"
      onerror="this.style.display='none'">
    <h2 style="font-family:'DM Serif Display',serif;font-size:22px;color:var(--olive);margin:0 0 20px;">${t("langSelectTitle")}</h2>
    <div class="lang-pills" style="justify-content:center;margin-bottom:28px;">
      ${SPLASH_LANGS.map(l => `
        <button class="lang-pill ${l.code === state.lang ? "active" : ""}" data-lang="${l.code}">
          ${l.flag} ${l.name}
        </button>
      `).join("")}
    </div>
    <button class="submit-btn" id="splash-continue-btn">${t("langSplashContinue")}</button>
  `;

  card.querySelectorAll(".lang-pill").forEach(btn => {
    btn.addEventListener("click", () => {
      state.lang = btn.dataset.lang;
      document.documentElement.lang = state.lang;
      document.getElementById("lang-select").value = state.lang;
      renderSplash();
    });
  });

  document.getElementById("splash-continue-btn").addEventListener("click", () => {
    state.langSelected = true;
    persistNow();
    setAutosaveStatus("saved");
    document.getElementById("lang-splash").classList.add("hidden");
    renderAll();
  });
}

// ── Countdown ────────────────────────────────────────────────────────────────
// May 10 2026 at 22:00 CEST (UTC+2) = 20:00 UTC
const DEFAULT_DEADLINE_ISO = "2026-05-10T20:00:00Z";
let DEADLINE = new Date(DEFAULT_DEADLINE_ISO);

function deadlineLocale() {
  return {
    fr: "fr-FR",
    en: "en-GB",
    it: "it-IT",
    nl: "nl-NL",
    de: "de-DE",
    es: "es-ES",
  }[state.lang] || "en-GB";
}

function formatDeadlineDate() {
  return new Intl.DateTimeFormat(deadlineLocale(), {
    dateStyle: "long",
    timeStyle: "short",
    timeZone: "Europe/Amsterdam",
  }).format(DEADLINE);
}

function formatCountdown() {
  const diff = DEADLINE - Date.now();
  if (diff <= 0) return t("sessionEnded");
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  return d > 0
    ? `${d}${t("cdDays")} ${h}${t("cdHours")} ${m}${t("cdMinutes")}`
    : `${h}${t("cdHours")} ${m}${t("cdMinutes")} ${s}${t("cdSeconds")}`;
}

function updateCountdown() {
  const text = formatCountdown();
  document.querySelectorAll(".countdown-timer").forEach(el => el.textContent = text);
}

function setDebugDeadline() {
  DEADLINE = new Date(Date.now() + 10 * 60000);
  renderAll();
  updateCountdown();
}

function resetDebugDeadline() {
  DEADLINE = new Date(DEFAULT_DEADLINE_ISO);
  renderAll();
  updateCountdown();
}

// ── Bootstrap ─────────────────────────────────────────────────────────────────

document.addEventListener("DOMContentLoaded", async () => {
  loadFromStorage();
  state.debugEnabled = shouldEnableDebugMenu();
  if (!state.debugEnabled) {
    state.debugMenuOpen = false;
    state.debugUnlockAllTabs = false;
  }
  await restoreInvitationSession();

  document.getElementById("hamburger-btn").addEventListener("click", () => {
    state.mobileOpen = true;
    renderAll();
  });

  document.getElementById("close-sidebar-btn").addEventListener("click", () => {
    state.mobileOpen = false;
    renderAll();
  });

  document.getElementById("overlay").addEventListener("click", () => {
    state.mobileOpen = false;
    renderAll();
  });

  document.getElementById("bug-report-backdrop").addEventListener("click", closeBugReportModal);
  document.getElementById("bug-report-cancel-btn").addEventListener("click", closeBugReportModal);
  document.getElementById("bug-report-submit-btn").addEventListener("click", async () => {
    const input = document.getElementById("bug-report-input");
    const status = document.getElementById("bug-report-status");
    const button = document.getElementById("bug-report-submit-btn");
    const message = input.value.trim();
    if (!message) {
      status.textContent = t("reportBugPlaceholder");
      return;
    }
    button.disabled = true;
    status.textContent = t("reportBugSending");
    const result = await submitBugReport(message);
    button.disabled = false;
    if (!result.ok) {
      status.textContent = t("reportBugError");
      return;
    }
    status.textContent = t("reportBugThanks");
    input.value = "";
    setTimeout(() => {
      closeBugReportModal();
      status.textContent = "";
    }, 700);
  });

  document.getElementById("lang-select").addEventListener("change", e => {
    state.lang = e.target.value;
    document.documentElement.lang = state.lang;
    schedulePersist();
    renderAll();
  });

  document.getElementById("debug-wipe-btn").addEventListener("click", () => {
    resetAppState();
  });

  document.getElementById("debug-invite-btn").addEventListener("click", () => {
    state.invitationValidated = true;
    if (!state.onboardingData.invitationNumber) {
      state.onboardingData.invitationNumber = "TEMP-BYPASS";
    }
    state.activeTab = 1;
    renderAll();
  });

  document.getElementById("debug-unlock-btn").addEventListener("click", () => {
    state.debugUnlockAllTabs = true;
    renderAll();
  });

  document.getElementById("debug-deadline-btn").addEventListener("click", () => {
    setDebugDeadline();
  });

  document.getElementById("debug-deadline-reset-btn").addEventListener("click", () => {
    resetDebugDeadline();
  });

  document.getElementById("debug-menu-toggle").addEventListener("click", () => {
    state.debugMenuOpen = !state.debugMenuOpen;
    renderAll();
  });

  window.addEventListener("resize", () => renderAll());

  renderAll();
  updateCountdown();
  setInterval(updateCountdown, 1000);

  if (!state.langSelected) {
    document.getElementById("lang-splash").classList.remove("hidden");
    renderSplash();
  }
});
</script>
</body>
</html>
